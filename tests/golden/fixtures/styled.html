<!doctype html>
<html><head><style>
  body { font-family: serif; padding: 30pt; }
  h1 { color: #333; border-bottom: 1pt solid #ccc; padding-bottom: 4pt; }
  .total { font-weight: bold; color: red; margin-top: 16pt; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1pt solid #999; padding: 6pt; }
  th { background: #eee; text-align: left; }
  tr:nth-child(even) td { background: #f7f7f7; }
</style></head><body>
  <h1>Invoice 0001</h1>
  <table>
    <thead><tr><th>Item</th><th>Qty</th><th>Total</th></tr></thead>
    <tbody>
      <tr><td>Widget</td><td>2</td><td>20€</td></tr>
      <tr><td>Gadget</td><td>1</td><td>15€</td></tr>
      <tr><td>Sprocket</td><td>4</td><td>40€</td></tr>
    </tbody>
  </table>
  <p class="total">Total : 75€</p>
</body></html>
